name: Build OpenWrt Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup OpenWrt SDK
      run: |
        wget https://downloads.openwrt.org/releases/23.05.6/targets/x86/64/openwrt-sdk-23.05.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        tar -xf openwrt-sdk-23.05.6-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        mv openwrt-sdk-23.05.6-x86-64_gcc-12.3.0_musl.Linux-x86_64 openwrt-sdk

    - name: Install feeds
      working-directory: openwrt-sdk
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy packages into SDK
      run: |
        cp -r luci-app-zzz openwrt-sdk/package/luci-app-zzz
        cp -r zzz-client-source openwrt-sdk/package/zzz-client

    - name: Configure build
      working-directory: openwrt-sdk
      run: |
        echo 'CONFIG_ALL_NONSHARED=y' > .config
        echo 'CONFIG_PACKAGE_luci-app-zzz=y' >> .config
        echo 'CONFIG_PACKAGE_zzz-client=y' >> .config
        make defconfig

    - name: Build packages
      working-directory: openwrt-sdk
      run: |
        make package/zzz-client/compile -j$(nproc)
        make package/luci-app-zzz/compile -j$(nproc)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-ipk-packages
        path: |
          openwrt-sdk/bin/packages/x86_64/base/*.ipk
          openwrt-sdk/bin/targets/x86/64/packages/*.ipk
