name: Build OpenWrt Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.0-rc1/targets/ipq40xx/generic/openwrt-sdk-23.05.0-rc1-ipq40xx-generic_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-23.05.0-rc1-ipq40xx-generic_gcc-12.3.0_musl_eabi.Linux-x86_64.tar.xz
          mv openwrt-sdk-23.05.0-rc1-ipq40xx-generic_gcc-12.3.0_musl_eabi.Linux-x86_64 openwrt-sdk

      - name: Install feeds
        working-directory: openwrt-sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy packages into SDK
        run: |
          cp -r luci-app-zzz openwrt-sdk/package/luci-app-zzz
          cp -r zzz-client-source openwrt-sdk/package/zzz-client

      - name: Build
        working-directory: openwrt-sdk
        run: |
          make defconfig
          make package/luci-app-zzz/compile -j$(nproc) V=s
        

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zzz-ipq40xx
          path: openwrt-sdk/bin/packages/**/*.ipk